<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye CBS Veri Portalı | Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animasyonlu arka plan */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M50 0 L100 50 L50 100 L0 50 Z" fill="white"/><circle cx="50" cy="50" r="20" fill="white"/></svg>');
            background-size: 100px 100px;
            animation: slide 20s linear infinite;
            pointer-events: none;
        }

        @keyframes slide {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(10deg); }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
        }

        /* Versiyon etiketi */
        .version {
            position: absolute;
            top: 20px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        /* Ana başlık - TÜRKİYE CBS VERİ PORTALI */
        h1 {
            font-size: 4rem;
            color: white;
            margin-bottom: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 1s ease;
            font-weight: 700;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        /* Alt başlık */
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease 0.3s both;
            line-height: 1.6;
        }

        /* KEŞFETMEYE BAŞLA butonu */
        .btn-kesfet {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e3c72;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 1s ease 0.6s both;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }

        .btn-kesfet:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            background: #f8f9fa;
        }

        .btn-kesfet:active {
            transform: translateY(0);
        }

        .btn-kesfet::after {
            content: '→';
            margin-left: 10px;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .btn-kesfet:hover::after {
            transform: translateX(5px);
        }

        /* Footer yazısı */
        .footer-note {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease 1s both;
        }

        /* Harita ikonları */
        .map-icons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .map-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .map-icon:nth-child(2) {
            animation-delay: 0.5s;
        }

        .map-icon:nth-child(3) {
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive tasarım */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
                padding: 0 1rem;
            }
            
            .btn-kesfet {
                padding: 1rem 2.5rem;
                font-size: 1.1rem;
            }
            
            .version {
                top: 10px;
                right: 15px;
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
            }
            
            .footer-note {
                font-size: 0.8rem;
                bottom: 15px;
                padding: 0.5rem 1rem;
            }
            
            .map-icon {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
            }
        }

        /* Hoş geldin mesajı için ekstra stil */
        .welcome-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: fadeInDown 1s ease;
        }
    </style>
</head>
<body>
    <!-- Versiyon etiketi -->
    <div class="version">Sürüm: <V2 class="1">V2.1</V2></div> 

    <!-- Ana içerik -->
    <div class="container">
        <!-- Hoş geldin mesajı -->
        <div class="welcome-message">🇹🇷 HOŞ GELDİNİZ</div>

        <!-- Harita ikonları -->
        <div class="map-icons">
            <div class="map-icon">🗺️</div>
            <div class="map-icon">📍</div>
            <div class="map-icon">🌍</div>
        </div>

        <!-- Ana başlık - TÜRKİYE CBS VERİ PORTALI -->
        <h1>TÜRKİYE CBS<br>VERİ PORTALI</h1>
        
        <!-- Alt başlık -->
        <div class="subtitle">
            Coğrafi Bilgi Sistemleri ile Türkiye'yi keşfedin<br>
            İl haritaları, nüfus verileri, tematik analizler
        </div>

        <!-- Keşfet butonu - PORTAL.HTML'E YÖNLENDİRİYOR -->
        <a href="portal.html" class="btn-kesfet">KEŞFETMEYE BAŞLA</a>
    </div>

    <!-- Footer notu -->
    <div class="footer-note">
        Coğrafya öğretiminde materyaller dersi kapsamında hazırlanmıştır
    </div>

    <script>
        // Butona tıklama efekti
        document.querySelector('.btn-kesfet').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Tıklama animasyonu
            this.style.transform = 'scale(0.95)';
            this.style.backgroundColor = '#e8e8e8';
            
            setTimeout(() => {
                this.style.transform = '';
                this.style.backgroundColor = 'white';
            }, 200);
            
            // Yönlendirme
            setTimeout(() => {
                window.location.href = 'portal.html';
            }, 300);
        });

        // Fare ile üzerine gelince hafif büyüme efekti
        document.querySelector('.btn-kesfet').addEventListener('mouseenter', function() {
            this.style.transform = 'scale(1.05)';
        });

        document.querySelector('.btn-kesfet').addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });

        // Konsola hoş geldin mesajı
        console.log('%c🗺️ TÜRKİYE CBS VERİ PORTALI v2.1', 'font-size: 20px; color: #fff; font-weight: bold; background: #1e3c72; padding: 5px;');
        console.log('%cCoğrafya öğretiminde materyaller dersi kapsamında hazırlanmıştır', 'font-size: 14px; color: #2a5298;');
        console.log('%c🔍 Keşfetmeye hazır mısın?', 'font-size: 16px; color: #27ae60;');
    </script>
</body>
</html>
